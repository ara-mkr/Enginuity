name: Bug Report
description: Report something that's broken or not working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as completely as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include console errors, screenshots, or a recording if possible.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (browser)
        - Desktop (Electron)
        - Both
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version (if web)
      placeholder: e.g. Chrome 128
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: e.g. macOS 15.1, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: ENGINGUITY version / commit
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: ai-provider
    attributes:
      label: AI Provider in use (if relevant)
      options:
        - Not applicable
        - OpenRouter (cloud)
        - Ollama (local)
        - Both
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / console output
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help us understand the issue.
    validations:
      required: false
