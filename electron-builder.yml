appId: com.enginguity.app
productName: Enginguity
copyright: "Copyright © 2024 Enginguity"

# Entry point
directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - electron/**/*.cjs
  - "!**/*.map"

# App icon (placed in build/ directory)
icon: build/icon.png

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  dmg:
    title: "Enginguity ${version}"
    icon: build/icon.png
    background: null
    window:
      width: 540
      height: 380
    contents:
      - x: 130
        y: 220
      - x: 410
        y: 220
        type: link
        path: /Applications

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  nsis:
    oneClick: false
    perMachine: false
    allowToChangeInstallationDirectory: true
    createDesktopShortcut: true
    createStartMenuShortcut: true
    installerIcon: build/icon.png
    uninstallerIcon: build/icon.png

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]

publish: null
