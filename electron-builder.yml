appId: com.enginguity.app
productName: ENGINGUITY
copyright: "Copyright © 2024 Enginguity"

# Entry point
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*.cjs
  - "!**/*.map"

# App icon (build/icon.icns / .ico / .png generated from the 2000px Ohma source)
icon: build/icon

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: "ENGINGUITY ${version}"
  icon: build/icon.icns
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]

publish: null
